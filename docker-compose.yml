services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - backend/.env
    environment:
      AUTOSCALER_URL: http://autoscaler:5001
    depends_on:
      - autoscaler

  autoscaler:
    build:
      context: .
      dockerfile: autoscaler/Dockerfile
    ports:
      - "5002:5001"
    env_file:
      - autoscaler/.env

  frontend:
    build:
      context: ./frontend-ng
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      API_BASE: http://localhost:5000
    depends_on:
      - backend
