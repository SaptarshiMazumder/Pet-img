name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (e.g. v1)"
        required: true
        default: "latest"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: worker
            context: ./runpod
            dockerfile: ./runpod/Dockerfile
            image: raj1145/pet-generator-worker
          - name: autoscaler
            context: .
            dockerfile: ./autoscaler/Dockerfile
            image: raj1145/pet-generator-autoscaler
          - name: backend
            context: .
            dockerfile: ./backend/Dockerfile
            image: raj1145/pet-generator-backend
          - name: frontend
            context: ./frontend-ng
            dockerfile: ./frontend-ng/Dockerfile
            image: raj1145/pet-generator-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ matrix.image }}:${{ github.event.inputs.tag }}
