name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (e.g. v1)"
        required: true
        default: "latest"

jobs:
  # RunPod worker → Docker Hub (unchanged)
  runpod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./runpod
          file: ./runpod/Dockerfile
          push: true
          tags: raj1145/pet-generator-worker:${{ github.event.inputs.tag }}

  # Autoscaler, backend, frontend → GCR (Cloud Run)
  gcr:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: autoscaler
            context: .
            dockerfile: ./autoscaler/Dockerfile
            image: gcr.io/pet-gen-dev/pet-generator-autoscaler
          - name: backend
            context: .
            dockerfile: ./backend/Dockerfile
            image: gcr.io/pet-gen-dev/pet-generator-backend
          - name: frontend
            context: ./frontend-ng
            dockerfile: ./frontend-ng/Dockerfile
            image: gcr.io/pet-gen-dev/pet-generator-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: pet-gen-dev

      - run: gcloud auth configure-docker gcr.io --quiet

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ matrix.image }}:${{ github.event.inputs.tag }}
