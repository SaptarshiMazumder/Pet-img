@if (items.length > 0) {
  <div class="modal-backdrop" (click)="closed.emit()"></div>

  <div class="order-modal">
    <div class="modal-header">
      <h2>Order Print{{ items.length > 1 ? 's' : '' }}</h2>
      <button class="modal-close" (click)="closed.emit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="modal-body">

      <!-- Selected image thumbnails -->
      <div class="selected-thumbs">
        @for (item of items; track item.job_id) {
          @if (item.presigned_url) {
            <img class="thumb-img" [src]="item.presigned_url" alt="Portrait" />
          }
        }
      </div>

      <form class="order-form" (ngSubmit)="submit()">

        <div class="form-row">
          <div class="form-group">
            <label>First Name <span class="required">*</span></label>
            <input [(ngModel)]="form.firstName" name="firstName" required />
          </div>
          <div class="form-group">
            <label>Last Name <span class="required">*</span></label>
            <input [(ngModel)]="form.lastName" name="lastName" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Email <span class="required">*</span></label>
            <input type="email" [(ngModel)]="form.email" name="email" required />
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input [(ngModel)]="form.phone" name="phone" />
          </div>
        </div>

        <div class="form-group">
          <label>Address Line 1 <span class="required">*</span></label>
          <input [(ngModel)]="form.addressLine1" name="addressLine1" required />
        </div>

        <div class="form-group">
          <label>Address Line 2 <span class="field-hint">(optional)</span></label>
          <input [(ngModel)]="form.addressLine2" name="addressLine2" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>City <span class="required">*</span></label>
            <input [(ngModel)]="form.city" name="city" required />
          </div>
          <div class="form-group">
            <label>Post Code <span class="required">*</span></label>
            <input [(ngModel)]="form.postCode" name="postCode" required />
          </div>
        </div>

        <div class="form-group">
          <label>Country</label>
          <input [(ngModel)]="form.country" name="country" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Print Size</label>
            <select [(ngModel)]="form.size" name="size">
              @for (s of sizeOptions; track s) {
                <option [value]="s">{{ s }}</option>
              }
            </select>
          </div>
          <div class="form-group">
            <label>Quantity</label>
            <input type="number" [(ngModel)]="form.quantity" name="quantity" min="1" max="20" required />
          </div>
        </div>

        <div class="form-group">
          <label>Notes <span class="field-hint">(optional)</span></label>
          <textarea [(ngModel)]="form.notes" name="notes" rows="2"></textarea>
        </div>

        @if (success) { <div class="msg-success">{{ success }}</div> }
        @if (error)   { <div class="msg-error">{{ error }}</div> }

        <div class="modal-actions">
          <button type="button" class="btn-secondary" (click)="closed.emit()">Cancel</button>
          <button type="submit" class="btn-primary" [disabled]="submitting">
            @if (!submitting) { Save Order }
            @else { Saving… }
          </button>
        </div>
      </form>
    </div>
  </div>
}
