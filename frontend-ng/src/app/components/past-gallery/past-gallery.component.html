<div class="past-header">
  <h3 class="past-title">{{ lang.t().past.title }}</h3>
  <div class="past-header-actions">
    @if (selectedCount > 0) {
      <button class="order-selected-btn" (click)="openOrder()">
        {{ lang.orderPortraits(selectedCount) }}
      </button>
    }
    <button class="refresh-btn" (click)="refresh.emit()" [disabled]="loading">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
      </svg>
      {{ lang.t().past.refresh }}
    </button>
  </div>
</div>

@if (loading) {
  <div class="past-loading">
    <div class="spinner-ring"></div>
  </div>
} @else if (gallery.length === 0) {
  <p class="past-empty">{{ lang.t().past.empty }}</p>
} @else {
  <div class="past-grid">
    @for (item of gallery; track item.job_id) {
      <div class="past-card-wrap" [class.past-card--selected]="isSelected(item.job_id)">
        <div
          class="past-card"
          [class.clickable]="!!item.presigned_url"
          (click)="item.presigned_url ? itemClicked.emit(item) : null"
        >
          @if (item.presigned_url) {
            <img class="past-img" [src]="item.presigned_url" [alt]="templateName(item.template_key)" loading="lazy" />

            <!-- Checkbox toggle -->
            <button
              class="select-check"
              [class.select-check--on]="isSelected(item.job_id)"
              (click)="toggleSelect(item, $event)"
              [attr.aria-label]="isSelected(item.job_id) ? lang.t().past.deselect : lang.t().past.selectForOrder"
            >
              @if (isSelected(item.job_id)) {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="12" height="12">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                </svg>
              }
            </button>

            <div class="past-hover">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15" />
              </svg>
            </div>
          } @else {
            <div class="past-missing">?</div>
          }
        </div>
        <div class="regen-strip">
          <button class="delete-btn" (click)="deleteRequested.emit(item)" [title]="lang.t().past.delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
              <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
            </svg>
          </button>
          <button class="regen-btn" (click)="onRegen(item)">{{ lang.t().queue.tryAgain }}</button>
        </div>
      </div>
    }
  </div>
}
