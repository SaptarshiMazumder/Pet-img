<div class="carousel-wrap">
  <button class="carousel-arrow carousel-arrow--prev" (click)="scroll(-1)" aria-label="Previous">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
    </svg>
  </button>

  <div class="carousel-track" #track>
    @for (key of templateKeys; track key; let i = $index) {
      <button
        class="carousel-card"
        [class.carousel-card--selected]="selectedTemplate === key"
        (click)="templateSelected.emit(key)"
      >
        @if (templates[key]?.preview_url) {
          <img class="carousel-img" [src]="templates[key].preview_url" [alt]="templates[key]?.name" />
        } @else {
          <div class="carousel-placeholder">{{ getIcon(i) }}</div>
        }
        <span class="carousel-label">{{ templates[key]?.name }}</span>
      </button>
    }
  </div>

  <button class="carousel-arrow carousel-arrow--next" (click)="scroll(1)" aria-label="Next">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
    </svg>
  </button>
</div>
