server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS; falls back to public resolver on Cloud Run.
    # Using $backend variable forces lazy DNS resolution so nginx doesn't
    # crash at startup when 'backend:5000' doesn't exist (e.g., Cloud Run).
    resolver 127.0.0.11 8.8.8.8 valid=5s ipv6=off;

    # BACKEND_UPSTREAM is set by docker-entrypoint.sh (default: backend:5000).
    # In Cloud Run, API_BASE points directly to the backend service URL so
    # the Angular app bypasses nginx — these locations are effectively unused.
    location ~ ^/(generate|job/|orders|user/|samples|styles|templates|warm|print/|catalog|assets/templates/) {
        set $backend "http://${BACKEND_UPSTREAM}";
        proxy_pass $backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
