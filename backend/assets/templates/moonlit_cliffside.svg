<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1f"/>
      <stop offset="100%" stop-color="#1a2340"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <!-- mountains -->
  <polygon points="0,220 80,120 160,200 240,100 320,160 400,80 400,300 0,300" fill="#0d1428" opacity="0.9"/>
  <polygon points="0,240 60,170 140,230 220,150 300,200 400,140 400,300 0,300" fill="#101830" opacity="0.95"/>
  <!-- moon -->
  <circle cx="300" cy="70" r="36" fill="none" stroke="#c8d8f0" stroke-width="1.5" opacity="0.3"/>
  <circle cx="300" cy="70" r="30" fill="#e8f0ff" opacity="0.85"/>
  <!-- mist -->
  <ellipse cx="200" cy="260" rx="220" ry="30" fill="#3a5080" opacity="0.2"/>
  <ellipse cx="200" cy="280" rx="200" ry="20" fill="#3a5080" opacity="0.15"/>
  <!-- label -->
  <text x="200" y="195" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#c8d8f0" opacity="0.9" letter-spacing="2">MOONLIT CLIFFSIDE</text>
  <text x="200" y="215" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#8899bb" letter-spacing="1">VIGIL</text>
</svg>
