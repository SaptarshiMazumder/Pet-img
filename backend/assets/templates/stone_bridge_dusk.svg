<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="50%" stop-color="#3d1800"/>
      <stop offset="100%" stop-color="#100800"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1008"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <!-- dusk sky gradient layer -->
  <ellipse cx="200" cy="0" rx="250" ry="120" fill="#8b3000" opacity="0.25"/>
  <!-- river -->
  <rect x="0" y="200" width="400" height="100" fill="url(#river)"/>
  <!-- gold reflections on water -->
  <line x1="150" y1="220" x2="250" y2="220" stroke="#c9601c" stroke-width="2" opacity="0.3"/>
  <line x1="130" y1="235" x2="270" y2="235" stroke="#c9601c" stroke-width="1.5" opacity="0.2"/>
  <line x1="110" y1="255" x2="290" y2="255" stroke="#c9601c" stroke-width="1" opacity="0.15"/>
  <!-- bridge arch -->
  <path d="M60,200 Q200,130 340,200" fill="none" stroke="#2a1a08" stroke-width="18"/>
  <path d="M60,200 Q200,130 340,200" fill="none" stroke="#3a2808" stroke-width="14"/>
  <!-- bridge deck -->
  <rect x="55" y="196" width="290" height="14" rx="2" fill="#2a1808" stroke="#5a3a18" stroke-width="1" opacity="0.9"/>
  <!-- railing -->
  <line x1="55" y1="190" x2="345" y2="190" stroke="#5a3a18" stroke-width="2" opacity="0.7"/>
  <!-- autumn trees -->
  <circle cx="30" cy="160" r="30" fill="#5a2008" opacity="0.6"/>
  <circle cx="375" cy="155" r="28" fill="#6a2808" opacity="0.6"/>
  <!-- paper lantern -->
  <ellipse cx="340" cy="175" rx="8" ry="10" fill="#c9a84c" opacity="0.8"/>
  <line x1="340" y1="165" x2="340" y2="155" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <!-- label -->
  <text x="200" y="155" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#c9804c" opacity="0.9" letter-spacing="2">STONE BRIDGE</text>
  <text x="200" y="175" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a05830" letter-spacing="1">AT DUSK</text>
</svg>
