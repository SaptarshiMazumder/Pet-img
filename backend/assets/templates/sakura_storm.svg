<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1020"/>
      <stop offset="100%" stop-color="#3d1f30"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <!-- tree trunk -->
  <line x1="80" y1="300" x2="100" y2="80" stroke="#2a1520" stroke-width="18"/>
  <line x1="100" y1="120" x2="200" y2="60" stroke="#2a1520" stroke-width="10"/>
  <line x1="105" y1="160" x2="30" y2="100" stroke="#2a1520" stroke-width="8"/>
  <!-- petals scattered -->
  <g fill="#e8a0b8" opacity="0.8">
    <ellipse cx="160" cy="80" rx="6" ry="3" transform="rotate(20,160,80)"/>
    <ellipse cx="220" cy="50" rx="5" ry="2.5" transform="rotate(-15,220,50)"/>
    <ellipse cx="300" cy="90" rx="6" ry="3" transform="rotate(35,300,90)"/>
    <ellipse cx="130" cy="140" rx="5" ry="2.5" transform="rotate(-30,130,140)"/>
    <ellipse cx="260" cy="130" rx="6" ry="3" transform="rotate(10,260,130)"/>
    <ellipse cx="340" cy="60" rx="5" ry="2.5" transform="rotate(45,340,60)"/>
    <ellipse cx="70" cy="180" rx="6" ry="3" transform="rotate(-20,70,180)"/>
    <ellipse cx="310" cy="170" rx="5" ry="2.5" transform="rotate(25,310,170)"/>
    <ellipse cx="190" cy="190" rx="6" ry="3" transform="rotate(-10,190,190)"/>
    <ellipse cx="50" cy="120" rx="5" ry="2.5" transform="rotate(40,50,120)"/>
    <ellipse cx="370" cy="130" rx="6" ry="3" transform="rotate(-35,370,130)"/>
    <ellipse cx="240" cy="220" rx="5" ry="2.5" transform="rotate(15,240,220)"/>
  </g>
  <!-- soft pink glow -->
  <radialGradient id="pglow" cx="50%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#e8a0b8" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#e8a0b8" stop-opacity="0"/>
  </radialGradient>
  <rect width="400" height="300" fill="url(#pglow)"/>
  <!-- label -->
  <text x="200" y="255" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#e8b0c4" opacity="0.9" letter-spacing="2">CHERRY BLOSSOM</text>
  <text x="200" y="275" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#b07888" letter-spacing="1">STORM</text>
</svg>
