<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#040810"/>
      <stop offset="100%" stop-color="#080f1f"/>
    </linearGradient>
    <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1a30"/>
      <stop offset="100%" stop-color="#060c18"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <!-- pine silhouettes -->
  <polygon points="20,300 20,180 35,140 50,180 50,300" fill="#060d1a"/>
  <polygon points="340,300 340,160 360,110 380,160 380,300" fill="#060d1a"/>
  <polygon points="355,300 355,190 370,155 385,190 385,300" fill="#060d1a"/>
  <!-- lake -->
  <rect x="0" y="180" width="400" height="120" fill="url(#lake)" opacity="0.95"/>
  <!-- moon in sky -->
  <circle cx="200" cy="80" r="28" fill="#dde8ff" opacity="0.9"/>
  <!-- moon reflection in lake -->
  <ellipse cx="200" cy="240" rx="18" ry="10" fill="#dde8ff" opacity="0.35"/>
  <line x1="200" y1="108" x2="200" y2="180" stroke="#dde8ff" stroke-width="1" opacity="0.2"/>
  <!-- ripple lines on water -->
  <line x1="80" y1="205" x2="320" y2="205" stroke="#3a5070" stroke-width="0.5" opacity="0.4"/>
  <line x1="60" y1="225" x2="340" y2="225" stroke="#3a5070" stroke-width="0.5" opacity="0.3"/>
  <line x1="40" y1="248" x2="360" y2="248" stroke="#3a5070" stroke-width="0.5" opacity="0.25"/>
  <!-- label -->
  <text x="200" y="142" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#8899cc" opacity="0.9" letter-spacing="2">MIDNIGHT LAKE</text>
  <text x="200" y="162" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#5566aa" letter-spacing="1">SAKE</text>
</svg>
