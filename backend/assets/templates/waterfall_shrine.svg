<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#051510"/>
      <stop offset="100%" stop-color="#0a2018"/>
    </linearGradient>
    <linearGradient id="wfall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0d8d0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#80b8b0" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <!-- forest silhouette -->
  <polygon points="0,300 0,160 30,120 60,160 80,100 110,150 130,80 160,140 180,100 200,120 210,80 240,130 260,100 290,150 320,90 350,140 370,110 400,140 400,300" fill="#051510"/>
  <!-- waterfall -->
  <rect x="170" y="0" width="60" height="200" fill="url(#wfall)" rx="4"/>
  <!-- mist at base -->
  <ellipse cx="200" cy="205" rx="70" ry="18" fill="#a0d0c8" opacity="0.25"/>
  <ellipse cx="200" cy="215" rx="80" ry="12" fill="#a0d0c8" opacity="0.15"/>
  <!-- pool -->
  <ellipse cx="200" cy="240" rx="100" ry="22" fill="#1a4038" opacity="0.7"/>
  <!-- ripples -->
  <ellipse cx="200" cy="240" rx="60" ry="10" fill="none" stroke="#80b8b0" stroke-width="1" opacity="0.4"/>
  <ellipse cx="200" cy="240" rx="80" ry="14" fill="none" stroke="#80b8b0" stroke-width="0.5" opacity="0.25"/>
  <!-- label -->
  <text x="200" y="278" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#a0d0c4" opacity="0.9" letter-spacing="2">WATERFALL SHRINE</text>
</svg>
