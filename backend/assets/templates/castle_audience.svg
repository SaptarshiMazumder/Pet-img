<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0800"/>
      <stop offset="100%" stop-color="#1a1400"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <!-- pillars -->
  <rect x="40" y="20" width="20" height="280" fill="#1a1200" stroke="#c9a84c" stroke-width="0.5" opacity="0.7"/>
  <rect x="340" y="20" width="20" height="280" fill="#1a1200" stroke="#c9a84c" stroke-width="0.5" opacity="0.7"/>
  <rect x="110" y="40" width="16" height="260" fill="#1a1200" stroke="#c9a84c" stroke-width="0.5" opacity="0.5"/>
  <rect x="274" y="40" width="16" height="260" fill="#1a1200" stroke="#c9a84c" stroke-width="0.5" opacity="0.5"/>
  <!-- dais / raised platform -->
  <rect x="120" y="200" width="160" height="16" rx="2" fill="#2a1e00" stroke="#c9a84c" stroke-width="1" opacity="0.8"/>
  <rect x="100" y="210" width="200" height="10" rx="2" fill="#2a1e00" stroke="#c9a84c" stroke-width="0.5" opacity="0.6"/>
  <!-- gold glow from torches -->
  <radialGradient id="tl" cx="15%" cy="50%" r="40%">
    <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="tr" cx="85%" cy="50%" r="40%">
    <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
  </radialGradient>
  <rect width="400" height="300" fill="url(#tl)"/>
  <rect width="400" height="300" fill="url(#tr)"/>
  <!-- banners -->
  <rect x="148" y="20" width="18" height="80" fill="#8b0000" opacity="0.7"/>
  <rect x="234" y="20" width="18" height="80" fill="#8b0000" opacity="0.7"/>
  <!-- label -->
  <text x="200" y="160" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#c9a84c" opacity="0.9" letter-spacing="2">SHOGUN'S</text>
  <text x="200" y="182" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a07830" letter-spacing="1">AUDIENCE HALL</text>
</svg>
