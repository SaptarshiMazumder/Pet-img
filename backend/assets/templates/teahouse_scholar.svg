<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1005"/>
      <stop offset="100%" stop-color="#2a1e0a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <!-- shoji screen panels -->
  <rect x="40" y="40" width="80" height="220" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.25"/>
  <rect x="130" y="40" width="80" height="220" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.25"/>
  <rect x="220" y="40" width="80" height="220" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.25"/>
  <rect x="310" y="40" width="80" height="220" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.25"/>
  <!-- warm glow from lantern -->
  <radialGradient id="glow" cx="50%" cy="40%" r="50%">
    <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
  </radialGradient>
  <rect width="400" height="300" fill="url(#glow)"/>
  <!-- lantern -->
  <rect x="188" y="30" width="24" height="40" rx="6" fill="#c9a84c" opacity="0.7"/>
  <line x1="200" y1="10" x2="200" y2="30" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <!-- label -->
  <text x="200" y="210" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#c9a84c" opacity="0.9" letter-spacing="2">NOBLE SCHOLAR'S</text>
  <text x="200" y="230" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#a07830" letter-spacing="1">TEA ROOM</text>
</svg>
