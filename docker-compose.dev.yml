# Dev override: volume mounts + hot reload
# Run: docker compose -f docker-compose.yml -f docker-compose.dev.yml up frontend backend --no-deps
#
# Backend: code changes reload automatically (gunicorn --reload)
# Frontend: ng serve with hot reload on http://localhost:4200

services:
  backend:
    volumes:
      - ./backend:/app/backend
    command: gunicorn --bind 0.0.0.0:5000 --workers 1 --reload backend.app:app

  frontend:
    build:
      context: ./frontend-ng
      dockerfile: Dockerfile.dev
    ports:
      - "4200:4200"
    volumes:
      - ./frontend-ng:/app
      - frontend_node_modules:/app/node_modules
    environment:
      API_BASE: http://localhost:5000
    command: npm start -- --host 0.0.0.0 --poll 2000

volumes:
  frontend_node_modules:
